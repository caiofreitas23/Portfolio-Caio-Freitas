<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato por e-mail</title>
</head>
<body>

    <h2>Envie uma Mensagem</h2>
    
    <form action="https://formsubmit.co/caiofreitasam.contatos@gmail.com" method="POST">
        
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="name" required><br><br>

        <label for="email">Seu E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="message" rows="5" required></textarea><br><br>

        <button type="submit">Enviar Mensagem</button>
    </form>

</body>
</html>
