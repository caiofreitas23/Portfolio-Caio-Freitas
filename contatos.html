<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Caio Freitas</title>
    <link rel="stylesheet" href="parte.css">
</head>
<body>

    <!-- Botão Dark Mode -->
    <button id="toggle-dark" onclick="toggleDark()">🌙</button>

    <!-- Cabeçalho -->
    <header>
        <nav>
            <a href="index.html">Início</a>
            <a href="projetos.html">Projetos</a>
            <a href="contatos.html">Contato</a>
        </nav>
    </header>

    <!-- Página de Contato -->
    <section id="contato-pagina">
        <h1>Entre em Contato</h1>
        <p>Preencha o formulário abaixo para enviar uma mensagem.</p>

        <div class="formulario-wrapper">

            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Seu nome completo">
            </div>

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>

            <div class="campo">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..."></textarea>
            </div>

            <button class="btn-enviar" onclick="enviarMensagem()">
                Enviar Mensagem
            </button>

            <p id="feedback-envio"></p>

        </div>
    </section>

    <!-- Redes Sociais -->
    <footer>
        <h2>Minhas Redes</h2>
        <p>
            🔗 <a href="https://github.com/caiofreitas23" target="_blank">GitHub</a> |
            <a href="https://www.linkedin.com/in/caiofamedeiros" target="_blank">LinkedIn</a>
        </p>
    </footer>

    <script src="paginicial.js"></script>

</body>
</html>
