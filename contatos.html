<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Caio Freitas</title>
    <link rel="stylesheet" href="parte.css">
</head>
<body>

    <!-- Botão Dark Mode -->
    <button id="toggle-dark" onclick="toggleDark()">🌙</button>

    <!-- Cabeçalho -->
    <header>
        <nav>
            <a href="index.html">← Voltar ao Portfólio</a>
        </nav>
    </header>

    <!-- Contato -->
    <section id="contato">
        <h2>Contato</h2>
        <div class="grade-projetos">

            <div class="card-projeto">
                <h3>GitHub</h3>
                <p>Veja meus repositórios e projetos.</p>
                <a href="https://github.com/caiofreitas23" target="_blank">Acessar GitHub</a>
            </div>

            <div class="card-projeto">
                <h3>Linkedin</h3>
                <p>Contate-me para oportunidades profissionais.</p>
                <a href="https://www.linkedin.com/in/caiofamedeiros" target="_blank">Acessar Linkedin</a>
            </div>

        </div>

        <!-- Formulário de contato -->
        <div class="card-projeto" style="max-width: 500px; margin: 2rem auto;">
            <h3>📩 Envie uma Mensagem</h3>
            <input type="text" id="nome" placeholder="Seu nome" style="width:100%; margin-bottom:0.8rem; padding:0.5rem; border-radius:6px; border:1px solid #ccc;"/>
            <input type="email" id="email" placeholder="Seu e-mail" style="width:100%; margin-bottom:0.8rem; padding:0.5rem; border-radius:6px; border:1px solid #ccc;"/>
            <textarea id="mensagem" placeholder="Sua mensagem" rows="4" style="width:100%; margin-bottom:0.8rem; padding:0.5rem; border-radius:6px; border:1px solid #ccc;"></textarea>
            <button onclick="enviarMensagem()">Enviar</button>
            <p id="feedback-envio" style="margin-top:0.5rem;"></p>
        </div>

    </section>

    <script src="paginicial.js"></script>
</body>
</html>
